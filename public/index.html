<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceway Map</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: rgb(30, 30, 30); /* Matches the Java2D background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .map-container {
            width: 100vw;
            height: 100vh;
            overflow: auto; /* Allows panning if zoomed in */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain; /* Ensures the whole map is visible initially */
        }
    </style>
</head>
<body>
<div class="map-container">
    <img src="iceway_map.png" alt="Generated Iceway Map" />
</div>
</body>
</html>
