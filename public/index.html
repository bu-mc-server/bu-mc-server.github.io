<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceway Interactive Map</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<header id="title-bar">
    <h1>Iceway Transit System</h1>
    <nav>
        <a href="#">Map</a>
    </nav>
</header>

<div id="controls">
    <div style="margin-bottom: 10px;">
        <label for="division-select">Division: </label>
        <select id="division-select">
            <option value="ALL">All Divisions</option>
            <option value="WEST">West Division</option>
            <option value="EAST">East Division</option>
        </select>
    </div>
    <div style="margin-top: 10px;">
        <label for="popup-mode">Label style: </label>
        <select id="popup-mode">
            <option value="ATTACHED">Attached</option>
            <option value="FIXED">Bottom Right</option>
        </select>
    </div>
</div>

<div id="map-container">
    <svg id="map-svg" width="100%" height="100%"></svg>
</div>

<div id="popup">
    <button id="close-btn">&times;</button>
    <h2 id="p-name">Station Name</h2>
    <p>Line: <span id="p-line" class="val">Color</span></p>
    <p>Division: <span id="p-div" class="val">EAST</span></p>
    <p>Coordinates: <span id="p-coords" class="val">(0, 0)</span></p>
</div>

<script src="map.js"></script>
</body>
</html>
